
<h2>Employee CRUD Operation</h2>

<mat-form-field>
  <mat-label>ID</mat-label>
  <input matInput [(ngModel)]="id">
</mat-form-field>

<mat-form-field>
  <mat-label>Name</mat-label>
  <input matInput [(ngModel)]="name">
</mat-form-field>

<mat-form-field>
  <mat-label>Salary</mat-label>
  <input matInput [(ngModel)]="salary">
</mat-form-field>

<button mat-raised-button (click)="addEmployee()">
  Add Employee
</button>

<button mat-raised-button (click) = "updateEmployee()">
  update Employee
</button>

<br><br>

<table mat-table [dataSource]="employees">
  
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef>ID</th>
    <td mat-cell *matCellDef="let e">{{e.id}}</td>
  </ng-container>





  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let e">{{e.name}}</td>
  </ng-container>

  <ng-container matColumnDef="salary">
    <th mat-header-cell *matHeaderCellDef>Salary</th>
    <td mat-cell *matCellDef="let e">{{e.salary}}</td>
  </ng-container>

  <ng-container matColumnDef="action">
    <th mat-header-cell *matHeaderCellDef>Action</th>
    <td mat-cell *matCellDef="let e; let i = index">

      <button mat-button (click) = "editEmployee(i)">
        Edit
      </button>

      <button mat-button (click)="deleteEmployee(i)">
        Delete
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

</table>
